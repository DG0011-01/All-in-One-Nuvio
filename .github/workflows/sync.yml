name: Sync Fork & Remove PlayIMDb

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/D3adlyRocket/All-in-One-Nuvio.git
          git fetch upstream
          git merge upstream/main --allow-unrelated-histories -X theirs

      - name: Delete PlayIMDb files
        run: |
          find . -name "playimdb*.js" -delete
          echo "Deleted playimdb files"

      - name: Remove PlayIMDb from manifest and add DG0011 suffix
        run: |
          node -e "
            const fs = require('fs');
            let manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.name = 'D3adlyRocket [DG0011]';
            manifest.scrapers = manifest.scrapers.filter(s => !s.id.startsWith('playimdb'));
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2));
          "

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-sync: removed playimdb scrapers, added DG0011 tag"
          git push
